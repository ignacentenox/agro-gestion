<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
	<defs>
		<linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#8B3A9F;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#6B2280;stop-opacity:1" />
		</linearGradient>
		<linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" style="stop-color:#B8E03F;stop-opacity:1" />
			<stop offset="100%" style="stop-color:#8DC63F;stop-opacity:1" />
		</linearGradient>
	</defs>
	<!-- Outer circle -->
	<circle cx="100" cy="95" r="80" fill="none" stroke="url(#purpleGrad)" stroke-width="14" stroke-linecap="round" stroke-dasharray="420 80" transform="rotate(-45 100 95)"/>
	<!-- Arrow tip on circle -->
	<polygon points="45,30 30,15 50,20" fill="url(#purpleGrad)"/>
	<!-- Green field (bottom half of circle) -->
	<path d="M 35,110 Q 100,80 165,110 L 165,140 Q 100,170 35,140 Z" fill="url(#greenGrad)" opacity="0.9"/>
	<!-- Field lines -->
	<line x1="100" y1="95" x2="155" y2="140" stroke="white" stroke-width="3" opacity="0.8"/>
	<line x1="100" y1="95" x2="140" y2="145" stroke="white" stroke-width="2.5" opacity="0.7"/>
	<line x1="100" y1="95" x2="125" y2="148" stroke="white" stroke-width="2" opacity="0.6"/>
	<!-- A letter -->
	<text x="72" y="115" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="60" fill="url(#purpleGrad)">A</text>
	<!-- G letter -->
	<text x="105" y="120" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="50" fill="url(#purpleGrad)">G</text>
	<!-- Text below -->
	<text x="100" y="205" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="currentColor" text-anchor="middle" letter-spacing="2">AGRO GESTIÓN</text>
</svg>
