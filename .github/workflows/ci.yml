name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and type-check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build app
        env:
          CI: true
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agrogestion
        run: npm run build
